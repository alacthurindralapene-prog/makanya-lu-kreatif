<!DOCTYPE html>
<html lang="id">
<head>
    <title>📚 GEMBULVERSE ANAK - 15 Cerita Lengkap! 📚</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* HEADER */
        .book-header { 
            text-align: center; 
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); 
            padding: 40px 20px; 
            border-radius: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            border: 8px solid #fff;
        }
        .logo { font-size: 5em; animation: wiggle 2s infinite; margin-bottom: 15px; }
        @keyframes wiggle { 0%, 100% { transform: rotate(-5deg); } 25% { transform: rotate(5deg); } 50% { transform: rotate(0deg); } }
        h1 { color: #e74c3c; font-size: 3em; margin: 15px 0; text-shadow: 3px 3px #fff; }
        .tagline { color: #7f8c8d; font-size: 1.4em; margin-bottom: 10px; }
        .instruction { background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; font-size: 1.1em; }

        /* LIST CERITA GRID */
        .story-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
            margin-bottom: 40px;
        }
        .story-card { 
            background: white; 
            border-radius: 25px; 
            padding: 30px 20px; 
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 5px solid transparent;
            position: relative;
            overflow: hidden;
            min-height: 280px;
        }
        .story-card:hover { 
            transform: translateY(-15px) scale(1.03); 
            box-shadow: 0 25px 50px rgba(231,76,60,0.4);
            border-color: #e74c3c;
        }
        .story-icon { font-size: 5em; text-align: center; margin: 20px 0; }
        .story-title { font-size: 1.8em; color: #2c3e50; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .story-preview { color: #7f8c8d; text-align: center; margin-bottom: 20px; font-size: 1.1em; }
        .read-btn { 
            background: linear-gradient(45deg, #e74c3c, #c0392b); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 30px; 
            font-size: 1.2em; 
            cursor: pointer; 
            width: 100%;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(231,76,60,0.3);
            transition: all 0.3s;
        }
        .read-btn:hover { background: linear-gradient(45deg, #c0392b, #a93226); transform: scale(1.05); }
        .age { font-size: 0.9em; color: #27ae60; font-weight: bold; text-align: center; margin-top: 10px; }

        /* MODAL FULL STORY */
        .modal-backdrop { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }
        .modal-content { 
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%); 
            max-width: 700px; 
            max-height: 85vh; 
            border-radius: 25px; 
            padding: 40px; 
            overflow-y: auto; 
            position: relative;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: modalPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 8px solid #e74c3c;
        }
        @keyframes modalPop { 0% { transform: scale(0.3) rotate(-180deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .modal-close { 
            position: absolute; 
            top: 20px; right: 25px; 
            font-size: 2.5em; 
            cursor: pointer; 
            color: #e74c3c; 
            width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; 
            transition: all 0.3s;
        }
        .modal-close:hover { background: #ffeaa7; transform: rotate(90deg); }
        .full-title { font-size: 2.2em; color: #e74c3c; text-align: center; margin-bottom: 25px; }
        .full-story { 
            font-size: 1.4em; 
            line-height: 1.9; 
            color: #2c3e50; 
            text-align: justify;
            margin-bottom: 25px;
        }
        .story-moral { 
            background: linear-gradient(135deg, #a8e6cf, #dcedc1); 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 20px; 
            font-size: 1.2em; 
            font-style: italic;
        }
        .voice-btn, .back-btn { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 25px; 
            font-size: 1.1em; 
            cursor: pointer; 
            margin: 10px 10px 10px 0;
            font-family: inherit;
        }
        .voice-btn:hover { background: #2980b9; }
        .btn-group { text-align: center; margin-top: 25px; }

        @media (max-width: 768px) { 
            .story-grid { grid-template-columns: 1fr; } 
            .full-story { font-size: 1.2em; } 
        }
    </style>
</head>

        <div class
