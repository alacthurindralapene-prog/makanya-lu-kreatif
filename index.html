<!DOCTYPE html>
<html>
<head>
<title>Mblek Bot</title>
</head>
<body>

<h2>😆 Mblek Bot</h2>
<p>Ngapain ke sini? Mau rajin ya?</p>

<button onclick="jawab('ebook')">📖 Lihat Ebook</button>
<button onclick="jawab('males')">😴 Lagi Males</button>

<p id="output"></p>

<script>
function jawab(pilihan) {
  if(pilihan === 'ebook'){
    document.getElementById("output").innerHTML =
    "Ini bukan ebook biasa 😶 <br><a href='LINK_KAMU'>Beli di sini</a>";
  } else {
    document.getElementById("output").innerHTML =
    "Santai… Mblek juga males kok 😌";
  }
}
</script>

</body>
</html>
